<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CredX — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #101828;
    --surface:  #151d30;
    --surface2: rgba(21,29,48,.92);
    --border:   rgba(255,255,255,.08);
    --border2:  rgba(255,255,255,.12);
    --cyan:     #22d3ee;
    --blue:     #3b82f6;
    --gold:     #f59e0b;
    --gold2:    #d97706;
    --text:     #f1f5f9;
    --text2:    #cbd5e1;
    --muted:    #8899b4;
    --red:      #f87171;
    --r:        12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(34,211,238,.06) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(59,130,246,.06) 0%, transparent 60%);
  }

  /* ── Header ── */
  header {
    background: rgba(16,24,40,.8);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }
  .logo img { width: 38px; height: 38px; border-radius: 9px; object-fit: cover; box-shadow: 0 2px 12px rgba(34,211,238,.25); }

  /* ── Main ── */
  main {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 48px 16px;
  }
  .card {
    width: 100%; max-width: 440px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    box-shadow: 0 8px 40px rgba(0,0,0,.4);
    overflow: hidden;
    backdrop-filter: blur(12px);
  }
  .card-header {
    padding: 28px 32px 24px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .card-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px; font-weight: 600;
    color: var(--text);
  }
  .card-header p { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .card-body { padding: 32px; }

  /* ── Form ── */
  .field { margin-bottom: 20px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 7px; letter-spacing: .3px; }
  input {
    width: 100%; padding: 11px 14px;
    background: rgba(255,255,255,.05);
    border: 1px solid var(--border2);
    border-radius: 8px;
    font-family: 'Sora', sans-serif;
    font-size: 14px; color: var(--text);
    transition: border-color .2s, box-shadow .2s;
  }
  input::placeholder { color: var(--muted); }
  input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(34,211,238,.12); }

  /* ── Button ── */
  .btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #0a0a0a;
    border: none; border-radius: 8px;
    font-family: 'Sora', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer; letter-spacing: .3px;
    transition: opacity .2s, transform .1s, box-shadow .2s;
    box-shadow: 0 4px 16px rgba(245,158,11,.25);
  }
  .btn:hover:not(:disabled) { opacity: .92; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(245,158,11,.35); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* ── Error ── */
  .error-msg {
    background: rgba(248,113,113,.1);
    border: 1px solid rgba(248,113,113,.3);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px; color: var(--red);
    margin-bottom: 20px; display: none;
  }

  .divider { text-align: center; margin-top: 24px; font-size: 13px; color: var(--muted); }
  .divider a { color: var(--cyan); text-decoration: none; }
  .divider a:hover { text-decoration: underline; }

  footer {
    text-align: center; padding: 20px;
    font-size: 12px; color: var(--muted);
    border-top: 1px solid var(--border);
  }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.2);
    border-top-color: #0a0a0a;
    border-radius: 50%; animation: spin .7s linear infinite;
    margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <a class="logo" href="/">
    <img src="/assets/credx-logo.jpg" alt="CredX">
  </a>
</header>

<main>
  <div class="card">
    <div class="card-header">
      <h2>Client Portal Sign In</h2>
      <p>Access your credit repair dashboard</p>
    </div>
    <div class="card-body">
      <div class="error-msg" id="error"></div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">Sign In to Portal</button>
      <div class="divider">
        Not enrolled yet? <a href="/">Start your free credit analysis</a>
      </div>
    </div>
  </div>
</main>

<footer>&copy; <span id="yr"></span> The Malloy Group Financial LLC &mdash; credxme.com</footer>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();

const tok = localStorage.getItem('credx_token');
if (tok) {
  const role = localStorage.getItem('credx_role');
  window.location.href = role === 'admin' ? '/admin' : '/portal';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('error');
  const btn      = document.getElementById('loginBtn');
  errEl.style.display = 'none';
  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.style.display = 'block'; return;
  }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in...';
  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Sign in failed');
    localStorage.setItem('credx_token', data.token);
    localStorage.setItem('credx_role',  data.user.role);
    localStorage.setItem('credx_user',  JSON.stringify(data.user));
    window.location.href = data.user.role === 'admin' ? '/admin' : '/portal';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = 'Sign In to Portal';
  }
}
</script>
</body>
</html>
