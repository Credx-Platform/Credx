<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CredX — Sign In</title>
<style>
  :root {
    --navy: #1a1f36;
    --gold: #c9a84c;
    --gold-light: #e8c870;
    --bg: #f5f5f0;
    --white: #ffffff;
    --gray: #6b7280;
    --red: #dc2626;
    --green: #16a34a;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, 'Times New Roman', serif;
    background: var(--bg);
    color: #1f2937;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--navy);
    padding: 20px 24px;
    text-align: center;
    box-shadow: 0 2px 12px rgba(0,0,0,.3);
  }
  header h1 { color: var(--gold); font-size: 26px; letter-spacing: 4px; font-weight: bold; }
  header p  { color: #aaa; font-size: 12px; margin-top: 2px; }
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--white);
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,.08);
    overflow: hidden;
  }
  .card-header {
    background: var(--navy);
    padding: 24px 32px;
    border-bottom: 3px solid var(--gold);
  }
  .card-header h2 { color: var(--white); font-size: 20px; }
  .card-header p  { color: #aaa; font-size: 13px; margin-top: 4px; }
  .card-body { padding: 32px; }
  .field { margin-bottom: 20px; }
  label {
    display: block;
    font-family: Arial, sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 15px;
    font-family: Georgia, serif;
    background: #fafaf8;
    transition: border-color .2s;
    color: #1f2937;
  }
  input:focus { outline: none; border-color: var(--gold); background: #fffdf5; }
  .btn {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: bold;
    font-family: Arial, sans-serif;
    cursor: pointer;
    transition: opacity .2s;
    letter-spacing: .5px;
  }
  .btn:hover:not(:disabled) { background: var(--gold-light); }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .error-msg {
    background: #fef2f2;
    border-left: 4px solid var(--red);
    padding: 12px 14px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--red);
    border-radius: 0 6px 6px 0;
    margin-bottom: 20px;
    display: none;
  }
  .footer-link {
    text-align: center;
    margin-top: 20px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    color: var(--gray);
  }
  .footer-link a { color: var(--gold); text-decoration: none; }
  footer {
    background: var(--navy);
    color: #777;
    text-align: center;
    padding: 16px;
    font-family: Arial, sans-serif;
    font-size: 12px;
  }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(26,31,54,.3);
    border-top-color: var(--navy);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>CREDX</h1>
  <p>The Malloy Group Financial LLC</p>
</header>

<main>
  <div class="card">
    <div class="card-header">
      <h2>Client Portal Sign In</h2>
      <p>Access your credit repair dashboard</p>
    </div>
    <div class="card-body">
      <div class="error-msg" id="error"></div>
      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn" id="loginBtn" onclick="doLogin()">Sign In to Portal</button>
      <div class="footer-link">
        <p>Not enrolled yet? <a href="/">Start your free credit analysis</a></p>
      </div>
    </div>
  </div>
</main>

<footer>
  &copy; <span id="yr"></span> The Malloy Group Financial LLC &mdash; credxme.com
</footer>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();

// Redirect if already logged in
const tok = localStorage.getItem('credx_token');
if (tok) {
  const role = localStorage.getItem('credx_role');
  window.location.href = role === 'admin' ? '/admin' : '/portal';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('error');
  const btn      = document.getElementById('loginBtn');

  errEl.style.display = 'none';
  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in...';

  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Sign in failed');

    localStorage.setItem('credx_token', data.token);
    localStorage.setItem('credx_role',  data.user.role);
    localStorage.setItem('credx_user',  JSON.stringify(data.user));

    window.location.href = data.user.role === 'admin' ? '/admin' : '/portal';
  } catch (err) {
    errEl.textContent = err.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = 'Sign In to Portal';
  }
}
</script>
</body>
</html>
