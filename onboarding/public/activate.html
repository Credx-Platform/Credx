<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CredX — Activate Your Account</title>
<style>
  :root {
    --navy: #1a1f36;
    --gold: #c9a84c;
    --gold-light: #e8c870;
    --bg: #f5f5f0;
    --white: #ffffff;
    --gray: #6b7280;
    --red: #dc2626;
    --green: #16a34a;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Georgia, 'Times New Roman', serif; background: var(--bg); color: #1f2937; min-height: 100vh; display: flex; flex-direction: column; }
  header { background: var(--navy); padding: 20px 24px; text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,.3); }
  header h1 { color: var(--gold); font-size: 26px; letter-spacing: 4px; font-weight: bold; }
  header p  { color: #aaa; font-size: 12px; margin-top: 2px; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
  .card { width: 100%; max-width: 440px; background: var(--white); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.08); overflow: hidden; }
  .card-header { background: var(--navy); padding: 24px 32px; border-bottom: 3px solid var(--gold); }
  .card-header h2 { color: var(--white); font-size: 20px; }
  .card-header p  { color: #aaa; font-size: 13px; margin-top: 4px; line-height: 1.5; }
  .card-body { padding: 32px; }
  .field { margin-bottom: 20px; }
  label { display: block; font-family: Arial, sans-serif; font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 6px; }
  input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 6px; font-size: 15px; font-family: Georgia, serif; background: #fafaf8; transition: border-color .2s; color: #1f2937; }
  input:focus { outline: none; border-color: var(--gold); background: #fffdf5; }
  .hint { font-family: Arial, sans-serif; font-size: 12px; color: var(--gray); margin-top: 4px; }
  .btn { width: 100%; padding: 14px; background: var(--gold); color: var(--navy); border: none; border-radius: 6px; font-size: 15px; font-weight: bold; font-family: Arial, sans-serif; cursor: pointer; transition: opacity .2s; }
  .btn:hover:not(:disabled) { background: var(--gold-light); }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .msg { padding: 12px 14px; border-radius: 0 6px 6px 0; font-family: Arial, sans-serif; font-size: 13px; margin-bottom: 20px; border-left: 4px solid; display: none; }
  .msg.error { background: #fef2f2; border-color: var(--red); color: var(--red); }
  .msg.success { background: #f0fdf4; border-color: var(--green); color: var(--green); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(26,31,54,.3); border-top-color: var(--navy); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { background: var(--navy); color: #777; text-align: center; padding: 16px; font-family: Arial, sans-serif; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>CREDX</h1>
  <p>The Malloy Group Financial LLC</p>
</header>

<main>
  <div class="card">
    <div class="card-header">
      <h2>Activate Your Account</h2>
      <p>Create a password to access your client portal.</p>
    </div>
    <div class="card-body">
      <div class="msg" id="msg"></div>
      <div id="form-wrap">
        <div class="field">
          <label>New Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
          <div class="hint">Minimum 8 characters</div>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password">
        </div>
        <button class="btn" id="btn" onclick="activate()">Activate &amp; Sign In</button>
      </div>
    </div>
  </div>
</main>

<footer>&copy; <span id="yr"></span> The Malloy Group Financial LLC</footer>

<script>
document.getElementById('yr').textContent = new Date().getFullYear();

const params = new URLSearchParams(window.location.search);
const token  = params.get('token');

if (!token) {
  showMsg('error', 'This activation link is invalid or has expired. Please contact support.');
  document.getElementById('form-wrap').style.display = 'none';
}

async function activate() {
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const btn      = document.getElementById('btn');

  hideMsg();

  if (password.length < 8) {
    return showMsg('error', 'Password must be at least 8 characters.');
  }
  if (password !== confirm) {
    return showMsg('error', 'Passwords do not match.');
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Activating...';

  try {
    const resp = await fetch('/api/auth/accept-invite', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Activation failed');

    localStorage.setItem('credx_token', data.token);
    localStorage.setItem('credx_role',  data.user.role);
    localStorage.setItem('credx_user',  JSON.stringify(data.user));

    showMsg('success', 'Account activated! Redirecting to your portal...');
    document.getElementById('form-wrap').style.display = 'none';
    setTimeout(() => { window.location.href = '/portal'; }, 1500);
  } catch (err) {
    showMsg('error', err.message);
    btn.disabled = false;
    btn.innerHTML = 'Activate &amp; Sign In';
  }
}

function showMsg(type, text) {
  const el = document.getElementById('msg');
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}
function hideMsg() {
  document.getElementById('msg').style.display = 'none';
}
</script>
</body>
</html>
