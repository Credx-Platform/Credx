<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CredX — Activate Your Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #101828; --surface: #151d30; --surface2: rgba(21,29,48,.92);
    --border: rgba(255,255,255,.08); --border2: rgba(255,255,255,.12);
    --cyan: #22d3ee; --blue: #3b82f6; --gold: #f59e0b; --gold2: #d97706;
    --text: #f1f5f9; --text2: #cbd5e1; --muted: #8899b4;
    --red: #f87171; --green: #34d399; --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; background-image: radial-gradient(ellipse at 20% 50%, rgba(34,211,238,.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(59,130,246,.06) 0%, transparent 60%); }
  header { background: rgba(16,24,40,.8); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: center; }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-mark { width: 36px; height: 36px; background: linear-gradient(135deg, var(--cyan), var(--blue)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: #fff; box-shadow: 0 0 16px rgba(34,211,238,.3); }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; background: linear-gradient(135deg, var(--cyan), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 1px; }
  main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 16px; }
  .card { width: 100%; max-width: 440px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--r); box-shadow: 0 8px 40px rgba(0,0,0,.4); overflow: hidden; backdrop-filter: blur(12px); }
  .card-header { padding: 28px 32px 24px; border-bottom: 1px solid var(--border); text-align: center; }
  .card-header h2 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; }
  .card-header p { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .card-body { padding: 32px; }
  .field { margin-bottom: 20px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 7px; }
  input { width: 100%; padding: 11px 14px; background: rgba(255,255,255,.05); border: 1px solid var(--border2); border-radius: 8px; font-family: 'Sora', sans-serif; font-size: 14px; color: var(--text); transition: border-color .2s, box-shadow .2s; }
  input::placeholder { color: var(--muted); }
  input:focus { outline: none; border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(34,211,238,.12); }
  .hint { font-size: 12px; color: var(--muted); margin-top: 5px; }
  .btn { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #0a0a0a; border: none; border-radius: 8px; font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s, transform .1s; box-shadow: 0 4px 16px rgba(245,158,11,.25); }
  .btn:hover:not(:disabled) { opacity: .92; transform: translateY(-1px); }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .msg { padding: 12px 14px; border-radius: 8px; border: 1px solid; font-size: 13px; margin-bottom: 20px; display: none; }
  .msg.error   { background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.3); color: var(--red); }
  .msg.success { background: rgba(52,211,153,.1); border-color: rgba(52,211,153,.3); color: var(--green); }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.2); border-top-color: #0a0a0a; border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  footer { text-align: center; padding: 20px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); }
</style>
</head>
<body>
<header>
  <a class="logo" href="/">
    <div class="logo-mark">C</div>
    <span class="logo-text">CredX</span>
  </a>
</header>
<main>
  <div class="card">
    <div class="card-header">
      <h2>Activate Your Account</h2>
      <p>Create a password to access your client portal</p>
    </div>
    <div class="card-body">
      <div class="msg" id="msg"></div>
      <div id="form-wrap">
        <div class="field">
          <label>New Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password">
          <div class="hint">Minimum 8 characters</div>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password">
        </div>
        <button class="btn" id="btn" onclick="activate()">Activate &amp; Sign In</button>
      </div>
    </div>
  </div>
</main>
<footer>&copy; <span id="yr"></span> The Malloy Group Financial LLC</footer>
<script>
document.getElementById('yr').textContent = new Date().getFullYear();
const params = new URLSearchParams(window.location.search);
const token  = params.get('token');
if (!token) {
  showMsg('error', 'This activation link is invalid or has expired. Please contact support.');
  document.getElementById('form-wrap').style.display = 'none';
}
async function activate() {
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const btn      = document.getElementById('btn');
  hideMsg();
  if (password.length < 8) return showMsg('error', 'Password must be at least 8 characters.');
  if (password !== confirm)  return showMsg('error', 'Passwords do not match.');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Activating...';
  try {
    const resp = await fetch('/api/auth/accept-invite', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Activation failed');
    localStorage.setItem('credx_token', data.token);
    localStorage.setItem('credx_role',  data.user.role);
    localStorage.setItem('credx_user',  JSON.stringify(data.user));
    showMsg('success', 'Account activated! Redirecting to your portal...');
    document.getElementById('form-wrap').style.display = 'none';
    setTimeout(() => { window.location.href = '/portal'; }, 1500);
  } catch (err) {
    showMsg('error', err.message);
    btn.disabled = false; btn.innerHTML = 'Activate &amp; Sign In';
  }
}
function showMsg(type, text) { const el = document.getElementById('msg'); el.className = 'msg ' + type; el.textContent = text; el.style.display = 'block'; }
function hideMsg() { document.getElementById('msg').style.display = 'none'; }
</script>
</body>
</html>
